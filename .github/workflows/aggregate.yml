name: Aggregate external feeds
on:
  schedule:
    - cron: "17 */6 * * *"   # 6時間ごと
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Aggregate
        run: python scripts/aggregate_feeds.py
      - name: Commit if changed
        run: |
          git config user.name "feed-bot"
          git config user.email "actions@github.com"
          git add external_feed.json
          git diff --cached --quiet || git commit -m "chore: update external feed [skip ci]"
          git push
